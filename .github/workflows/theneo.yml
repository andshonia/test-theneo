name: Update Documentation

on:

  pull_request:

    branches:

      - main

jobs:

  update-doc:

    name: Update Theneo Documentation

    runs-on: ubuntu-latest

    steps:

      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: "18"
      - name: Update Documentation on Theneo

        uses: Theneo-Inc/api-documentation@1.8.0

        with:

          FILE_PATH: brokerageAPI_1.2.yaml

          PROJECT_SLUG: testing-project
  
          WORKSPACE_SLUG: mywk

          SECRET: ${{secrets.THENEO_SECRET}}


          AUTO_PUBLISH: true

          IMPORT_OPTION: overwrite
 

          INCLUDE_GITHUB_METADATA: true
