    "/v1/accounts/{account_id}/position-groups": {
      "get": {
        "tags": [
          "Accounts"
        ],
        "summary": "Get Account Position Groups",
        "description": "Retrieves all position groups for a specific account.",
        "operationId": "brokerage-api-accounts-get-account-position-groups",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "$ref": "#/components/parameters/AccountIdParam"
          },
          {
            "$ref": "#/components/parameters/AcceptHeader"
          }
        ],
        "responses": {
          "200": {
            "description": "Position groups information",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/PositionGroupsResponse"
                },
                "example": {
                  "position-groups": [
                    {
                      "id": 1,
                      "label": "TROW Covered Call",
                      "symbols": [
                        "TROW",
                        "TROW260116C00125000"
                      ]
                    },
                    {
                      "id": 2,
                      "label": "Degen Put Strategy",
                      "symbols": [
                        "ETHA251219C00026000",
                        "ETHA251219P00025000"
                      ]
                    }
                  ]
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          }
        }
      },
      "post": {
        "tags": [
          "Accounts"
        ],
        "summary": "Create a New Position Group",
        "description": "Creates a new position group for a specific account.",
        "operationId": "brokerage-api-accounts-post-account-position-groups",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "$ref": "#/components/parameters/AccountIdParam"
          },
          {
            "$ref": "#/components/parameters/AcceptHeader"
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/x-www-form-urlencoded": {
              "schema": {
                "type": "object",
                "required": [
                  "label",
                  "symbols"
                ],
                "properties": {
                  "label": {
                    "type": "string",
                    "description": "A position group name"
                  },
                  "symbols": {
                    "type": "string",
                    "description": "Comma-delimited list of symbols to add to the position group"
                  }
                }
              },
              "example": {
                "label": "Big Tech",
                "symbols": "AAPL,MSFT,GOOGL,AMZN"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Position group created successfully",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/PositionGroupsResponse"
                },
                "example": {
                  "position-groups": [
                    {
                      "id": 1,
                      "label": "Magnificent 7",
                      "symbols": [
                        "AAPL",
                        "MSFT",
                        "GOOGL",
                        "AMZN",
                        "NVDA",
                        "TSLA",
                        "META"
                      ]
                    },
                    {
                      "id": 2,
                      "label": "Medical Plays",
                      "symbols": [
                        "UNH",
                        "PFE",
                        "JNJ"
                      ]
                    }
                  ]
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          }
        }
      }
    },
