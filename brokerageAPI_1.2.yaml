            "$ref": "#/components/parameters/AccountIdParam"
          },
          {
            "$ref": "#/components/parameters/AcceptHeader"
          },
          {
            "name": "period",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "WEEK",
                "MONTH",
                "YTD",
                "YEAR",
                "YEAR_3",
                "YEAR_5",
